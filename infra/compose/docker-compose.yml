name: dontopedia

# Single-host deploy topology. All services share a user-defined bridge so
# they can reach each other by name; only web, caddy, grafana, and dev ports
# are published.
#
# Build contexts are `../../../` — the PARENT of both dontopedia/ and donto/.
# Every Dockerfile that needs donto source references it as `donto/...`, and
# dontopedia source as `dontopedia/...`. This lets us link the local
# @donto/client without publishing a package.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: donto
      POSTGRES_PASSWORD: donto
      POSTGRES_DB: donto
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donto"]
      interval: 5s
      timeout: 3s
      retries: 20

  dontosrv:
    build:
      context: ../../../
      dockerfile: dontopedia/infra/docker/dontosrv.Dockerfile
    restart: unless-stopped
    environment:
      DONTO_DSN: postgres://donto:donto@postgres:5432/donto
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7878:7878"

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: donto
      POSTGRES_PWD: donto
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: "config/dynamicconfig/development-sql.yaml"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      - temporal
    ports:
      - "127.0.0.1:8233:8080"

  # Per-session Claude sandbox image. Built here so `docker compose build`
  # produces it; the worker spawns it with `docker run --rm` when a session
  # starts. No ports, no long-running container.
  claude-sandbox:
    build:
      context: ../../../
      dockerfile: dontopedia/infra/docker/claude-sandbox.Dockerfile
    image: dontopedia-claude-sandbox:latest
    command: ["--version"]
    restart: "no"
    profiles: ["build-only"]

  agent-runner:
    build:
      context: ../../../
      dockerfile: dontopedia/infra/docker/agent-runner.Dockerfile
    restart: unless-stopped
    environment:
      DONTOSRV_URL: http://dontosrv:7878
      TEMPORAL_ADDRESS: temporal:7233
      RUNNER_PUBLIC_URL: http://agent-runner:4001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_RUNNER_MOCK: ${AGENT_RUNNER_MOCK:-0}
    depends_on:
      - dontosrv
      - temporal
    ports:
      - "127.0.0.1:4001:4001"

  worker:
    build:
      context: ../../../
      dockerfile: dontopedia/infra/docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      DONTOSRV_URL: http://dontosrv:7878
      TEMPORAL_ADDRESS: temporal:7233
      RUNNER_PUBLIC_URL: http://agent-runner:4001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-gpt-4.1-mini}
      # Sandbox settings — worker spawns per-session sibling containers via
      # docker.sock. Set CLAUDE_SANDBOX_IMAGE=0 (or unset socket) to fall
      # back to spawning on the host for dev.
      CLAUDE_SANDBOX_IMAGE: dontopedia-claude-sandbox:latest
      CLAUDE_SANDBOX_NETWORK: dontopedia_default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - dontosrv
      - temporal

  web:
    build:
      context: ../../../
      dockerfile: dontopedia/infra/docker/web.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DONTOSRV_URL: http://dontosrv:7878
      NEXT_PUBLIC_DONTOSRV_URL: ${NEXT_PUBLIC_DONTOSRV_URL:-http://localhost:7878}
      AGENT_RUNNER_URL: http://agent-runner:4001
      DATABASE_URL: postgres://donto:donto@postgres:5432/donto
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://dontopedia.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAGIC_LINK_FROM: ${MAGIC_LINK_FROM:-Dontopedia <auth@dontopedia.com>}
    depends_on:
      - dontosrv
      - agent-runner
      - postgres
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-dontopedia}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/dash:/etc/grafana/provisioning/dashboards/dash:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    ports:
      - "127.0.0.1:3001:3000"

  backups:
    build:
      context: ../../../
      dockerfile: dontopedia/infra/docker/backups.Dockerfile
    restart: unless-stopped
    environment:
      PGURL: postgres://donto:donto@postgres:5432/donto
      RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-14}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-dontopedia/pg}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - pg-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  caddy-data:
  caddy-config:
  loki-data:
  grafana-data:
  pg-backups:
