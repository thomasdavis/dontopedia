<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predicate Extraction Benchmark</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --tier1: #58a6ff;
    --tier2: #3fb950;
    --tier3: #d29922;
    --tier4: #f0883e;
    --tier5: #f85149;
    --tier6: #bc8cff;
    --tier7: #ff7b72;
    --tier8: #d2a8ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    line-height: 1.5;
  }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  .card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .card .detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 32px;
  }
  th {
    text-align: left;
    padding: 10px 8px;
    border-bottom: 2px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }
  th:hover { color: var(--accent); }
  th.sorted-asc::after { content: ' ▲'; color: var(--accent); }
  th.sorted-desc::after { content: ' ▼'; color: var(--accent); }
  td {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tr:hover td { background: rgba(88, 166, 255, 0.04); }
  tr.error td { opacity: 0.4; }
  .model-name {
    font-weight: 600;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .bar-cell { min-width: 200px; }

  .tier-bar {
    display: flex;
    height: 20px;
    border-radius: 3px;
    overflow: hidden;
    background: var(--border);
    min-width: 160px;
  }
  .tier-bar .seg {
    height: 100%;
    position: relative;
    transition: width 0.3s;
  }
  .tier-bar .seg:hover { filter: brightness(1.3); }
  .tier-bar .seg:hover::after {
    content: attr(data-label);
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 10;
  }
  .seg-t1 { background: var(--tier1); }
  .seg-t2 { background: var(--tier2); }
  .seg-t3 { background: var(--tier3); }
  .seg-t4 { background: var(--tier4); }
  .seg-t5 { background: var(--tier5); }
  .seg-t6 { background: var(--tier6); }
  .seg-t7 { background: var(--tier7); }
  .seg-t8 { background: var(--tier8); }

  .legend { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }

  .cost-good { color: var(--green); }
  .cost-mid { color: var(--orange); }
  .cost-high { color: var(--red); }

  .preds-section { margin-top: 32px; }
  .preds-section h2 { font-size: 18px; margin-bottom: 16px; }
  .pred-model {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .pred-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
  }
  .pred-header:hover { background: rgba(88, 166, 255, 0.04); }
  .pred-body { padding: 0 16px 12px; display: none; }
  .pred-body.open { display: block; }
  .pred-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .pred-tag {
    background: var(--border);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-family: 'SF Mono', Monaco, monospace;
  }

  .tier-labels { font-size: 11px; color: var(--text-muted); }
</style>
</head>

  return usage.promptTokens * p.in + usage.completionTokens * p.out;

  if (c < 0.01) return '$' + c.toFixed(4);

}

  { key: 'model', label: 'Model', cls: 'model-name', sort: 'str' },
  { key: 'facts', label: 'Facts', cls: 'num', sort: 'num' },
  { key: 'uniq', label: 'Unique', cls: 'num', sort: 'num' },
  { key: 'tiers', label: 'Tiers', cls: 'num', sort: 'num' },
  { key: 'tierbar', label: 'Tier Distribution', cls: 'bar-cell', sort: null },
  { key: 't1', label: 'T1', cls: 'num', sort: 'num' },
  { key: 't2', label: 'T2', cls: 'num', sort: 'num' },
  { key: 't3', label: 'T3', cls: 'num', sort: 'num' },
  { key: 't4', label: 'T4', cls: 'num', sort: 'num' },
  { key: 't5', label: 'T5', cls: 'num', sort: 'num' },
  { key: 't6', label: 'T6', cls: 'num', sort: 'num' },
  { key: 't7', label: 'T7', cls: 'num', sort: 'num' },
  { key: 't8', label: 'T8', cls: 'num', sort: 'num' },
  { key: 'conf', label: 'Conf', cls: 'num', sort: 'num' },
  { key: 'tokIn', label: 'Tok In', cls: 'num', sort: 'num' },
  { key: 'tokOut', label: 'Tok Out', cls: 'num', sort: 'num' },
  { key: 'cost', label: 'Cost', cls: 'num', sort: 'num' },
  { key: 'costPerFact', label: '$/Fact', cls: 'num', sort: 'num' },
  { key: 'cost1k', label: '$/1k Facts', cls: 'num', sort: 'num' },
  { key: 'fkt', label: 'F/kT', cls: 'num', sort: 'num' },
  { key: 'time', label: 'Time', cls: 'num', sort: 'num' },
  { key: 'qOnto', label: 'Onto', cls: 'num', sort: 'num' },
  { key: 'qHyg', label: 'Hyg', cls: 'num', sort: 'num' },
  { key: 'qGround', label: 'Ground', cls: 'num', sort: 'num' },
  { key: 'qTier', label: 'TierQ', cls: 'num', sort: 'num' },
  { key: 'qGraph', label: 'Graph', cls: 'num', sort: 'num' },
  { key: 'qAvg', label: 'Avg Q', cls: 'num', sort: 'num' },
];

function buildRows() {
  return [...valid, ...failed].map(d => {
    const td = d.score.tierDistribution || {};
    const cost = calcCost(d.model, d.usage);
    const cpf = d.score.totalPredicates > 0 ? cost / d.score.totalPredicates : 0;
    const tiersHit = [1,2,3,4,5,6,7,8].filter(t => (td[t]||0) > 0).length;
    return {
      _raw: d,
      _error: !!d.error || d.score.totalPredicates === 0,
      model: d.model,
      facts: d.score.totalPredicates,
      uniq: d.score.uniquePredicates,
      tiers: tiersHit,
      tierbar: td,
      t1: td[1]||0, t2: td[2]||0, t3: td[3]||0, t4: td[4]||0,
      t5: td[5]||0, t6: td[6]||0, t7: td[7]||0, t8: td[8]||0,
      conf: d.score.avgConfidence,
      tokIn: d.usage.promptTokens,
      tokOut: d.usage.completionTokens,
      cost: cost,
      costPerFact: cpf,
      cost1k: cpf * 1000,
      fkt: d.score.factsPerKToken,
      time: d.durationMs / 1000,
      qOnto: (QSCORES[d.model] || [])[0] || 0,
      qHyg: (QSCORES[d.model] || [])[1] || 0,
      qGround: (QSCORES[d.model] || [])[2] || 0,
      qTier: (QSCORES[d.model] || [])[3] || 0,
      qGraph: (QSCORES[d.model] || [])[4] || 0,
      qAvg: QSCORES[d.model] ? (QSCORES[d.model].reduce((a,b)=>a+b,0) / 5) : 0,
    };
  });
}

let rows = buildRows();
let sortCol = 'facts';
let sortDir = 'desc';

function tierBarHTML(td, total) {
  if (total === 0) return '<div class="tier-bar"></div>';
  let html = '<div class="tier-bar">';
  for (let t = 1; t <= 8; t++) {
    const n = td[t] || 0;
    if (n === 0) continue;
    const pct = (n / total * 100).toFixed(1);
    html += `<div class="seg seg-t${t}" style="width:${pct}%" data-label="T${t}: ${n} (${Math.round(pct)}%)"></div>`;
  }
  html += '</div>';
  return html;
}

function renderTable() {
  const hdr = document.getElementById('table-header');
  hdr.innerHTML = '';
  cols.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c.label;
    th.className = c.cls || '';
    if (c.key === sortCol) th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    if (c.sort) {
      th.onclick = () => {
        if (sortCol === c.key) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
        else { sortCol = c.key; sortDir = 'desc'; }
        renderTable();
      };
    }
    hdr.appendChild(th);
  });

  const sorted = [...rows].sort((a,b) => {
    if (a._error && !b._error) return 1;
    if (!a._error && b._error) return -1;
    const col = cols.find(c => c.key === sortCol);
    if (!col || !col.sort) return 0;
    let va = a[sortCol], vb = b[sortCol];
    if (col.sort === 'str') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  sorted.forEach(r => {
    const tr = document.createElement('tr');
    if (r._error) tr.className = 'error';
    cols.forEach(c => {
      const td = document.createElement('td');
      td.className = c.cls || '';
      if (c.key === 'model') {
        td.textContent = r.model;
      } else if (c.key === 'tierbar') {
        td.innerHTML = tierBarHTML(r.tierbar, r.facts);
      } else if (c.key === 'tiers') {
        td.textContent = r.tiers + '/8';
      } else if (c.key === 'conf') {
        td.textContent = r.conf > 0 ? r.conf.toFixed(2) : '-';
      } else if (c.key === 'cost') {
        td.textContent = fmtCost(r.cost);
        td.className += ' ' + costClass(r.cost);
      } else if (c.key === 'costPerFact') {
        td.textContent = r.facts > 0 ? fmtCost(r.costPerFact) : '-';
        td.className += ' ' + costClass(r.costPerFact * 100);
      } else if (c.key === 'cost1k') {
        if (r.facts > 0 && r.cost1k > 0) {
          td.textContent = '$' + r.cost1k.toFixed(2);
          td.className += ' ' + (r.cost1k < 0.5 ? 'cost-good' : r.cost1k < 2 ? 'cost-mid' : 'cost-high');
        } else { td.textContent = '-'; }
      } else if (c.key === 'fkt') {
        td.textContent = r.fkt > 0 ? r.fkt.toFixed(1) : '-';
      } else if (c.key === 'time') {
        td.textContent = r.time.toFixed(1) + 's';
      } else if (c.key.startsWith('q')) {
        const v = r[c.key];
        if (v > 0) {
          td.textContent = c.key === 'qAvg' ? v.toFixed(1) : v;
          td.style.color = v >= 8 ? 'var(--green)' : v >= 6 ? 'var(--orange)' : 'var(--red)';
          if (v >= 9) td.style.fontWeight = '700';
        } else { td.textContent = '-'; }
      } else if (c.key === 'tokIn' || c.key === 'tokOut') {
        td.textContent = r[c.key] > 0 ? r[c.key].toLocaleString() : '-';
      } else {
        td.textContent = r[c.key] || (r._error ? '-' : '0');
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

renderTable();

// Predicates accordion
const predsEl = document.getElementById('preds-list');
[...valid].sort((a,b) => b.score.totalPredicates - a.score.totalPredicates).forEach(d => {
  const div = document.createElement('div');
  div.className = 'pred-model';
  const preds = d.score.predicateList || [];
  div.innerHTML = `
    <div class="pred-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <span>${d.model} <span style="color:var(--text-muted);font-weight:400">(${preds.length} unique)</span></span>
      <span style="color:var(--text-muted)">▾</span>
    </div>
    <div class="pred-body">
      <div class="pred-tags">${preds.map(p => `<span class="pred-tag">${p}</span>`).join('')}</div>
    </div>
  `;
  predsEl.appendChild(div);
});
</script>
</body>
</html>
